name: release

on:
  push:
    branches:
      - main

jobs:
  ci:
    uses: ./.github/workflows/lint-and-test.yml

  release:
    needs:
      - ci
    permissions:
      contents: write
      packages: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - run: |
          git config --global user.email tx3stn@github-action.com
          git config --global user.name 'tx3stn github actions'
          VERSION=$(head -n 1 VERSION)
          MAJOR=$(echo "${VERSION}" | cut -d. -f1)
          MAJOR_MINOR=$(echo "${VERSION}" | cut -d. -f1,2)
          git fetch --force --tags
          if git rev-parse -q --verify "refs/tags/${VERSION}" >/dev/null; then
            echo "Tag ${VERSION} already exists; skipping release tagging"
          else
            git tag -a "${VERSION}" -m "Release ${VERSION}"
            git push origin "${VERSION}"

            # Move the floating major and major.minor tags onto this release so
            # the GitHub Action can be pinned with @${MAJOR} or @${MAJOR_MINOR}
            # (mirroring the ghcr image tags). These move on every release.
            git tag -f -a "${MAJOR}" -m "Update ${MAJOR} tag to ${VERSION}"
            git push -f origin "${MAJOR}"
            git tag -f -a "${MAJOR_MINOR}" -m "Update ${MAJOR_MINOR} tag to ${VERSION}"
            git push -f origin "${MAJOR_MINOR}"
          fi
      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: "1.26"
          cache: true
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
